openapi: 3.0.0
info:
  title: SSAPI
  version: 1.0.0
  description: |
    SSAPI는 REST API 아키텍처를 기반으로 설계되었습니다. API를 통해 스트리머 정보 조회, 데이터 관리, 이벤트 조회 등 다양한 기능을 사용할 수 있습니다.

servers:
  - url: https://api.ssapi.kr
    description: SSAPI 서버
    
components:
  responses:
    Success:
      description: |
        ### 성공 응답
        - `200 OK`: 요청이 성공적으로 처리됨
        - `201 Created`: 새로운 리소스가 성공적으로 생성됨
        - `204 No Content`: 요청이 성공했으나 응답 본문이 없음
    
    ClientError:
      description: |
        ### 클라이언트 오류
        - `400 Bad Request`: 잘못된 요청 구문, 유효하지 않은 요청
        - `401 Unauthorized`: 인증되지 않은 요청
        - `403 Forbidden`: 권한이 없는 요청
        - `404 Not Found`: 요청한 리소스를 찾을 수 없음
        - `429 Too Many Requests`: 요청 횟수 제한 초과
    
    ServerError:
      description: |
        ### 서버 오류
        - `500 Internal Server Error`: 서버 내부 오류
        - `503 Service Unavailable`: 서비스 일시적 사용 불가

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      
  schemas:
    User:
      type: object
      properties:
        platform:
          type: string
          description: 방송 플랫폼
        streamer_id:
          type: string
          description: 방송인 아이디
        createdAt:
          type: string
          format: date-time
          description: 정보 생성일

    Chat:
      type: object
      properties:
        _id:
          type: string
          description: 채팅 ID
        type:
          type: string
          enum: [chat]
          description: chat으로 고정
        platform:
          type: string
          description: 방송 플랫폼
        streamer_id:
          type: string
          description: 방송인 아이디
        message:
          type: string
          description: 채팅 메시지
        user_id:
          type: string
          description: 시청자 아이디
        nickname:
          type: string
          description: 시청자 닉네임
        extras:
          type: object
          description: 추가 데이터
        createdAt:
          type: string
          format: date-time
          description: 데이터 생성일시
        ttl:
          type: string
          format: date-time
          description: 데이터 삭제예정일시
        __v:
          type: integer
          description: 데이터 버전

    Donation:
      type: object
      properties:
        _id:
          type: string
          description: 채팅 ID
        type:
          type: string
          enum: [donation]
          description: donation으로 고정
        platform:
          type: string
          description: 방송 플랫폼
        streamer_id:
          type: string
          description: 방송인 아이디
        message:
          type: string
          description: 채팅 메시지 (숲의 경우 이 필드는 대부분의 경우 공백)
        user_id:
          type: string
          description: 시청자(후원자) 아이디
        nickname:
          type: string
          description: 시청자(후원자) 닉네임
        cnt:
          type: integer
          description: 후원 수량
        amount:
          type: integer
          description: 후원 KRW 가치 (별풍선은 하나당 백원, 치즈는 하나당 1원)
        extras:
          type: object
          description: 추가 데이터
        createdAt:
          type: string
          format: date-time
          description: 데이터 생성일시
        ttl:
          type: string
          format: date-time
          description: 데이터 삭제예정일시
        __v:
          type: integer
          description: 데이터 버전

    MissionDonor:
      type: object
      description: |
        정산(settle) 페이로드에 포함되는 개별 후원자 항목.
        같은 mission key 의 receive 단계 후원 row 들을 시간순으로 모은 것입니다.
      properties:
        user_id:
          type: string
          description: 후원자 아이디
        nickname:
          type: string
          description: 후원자 닉네임
        platform:
          type: string
          enum: [soop, chzzk]
          description: 방송 플랫폼
        streamer_id:
          type: string
          description: 후원이 발생한 방송인 아이디 (대결미션은 양 스트리머가 섞여있을 수 있음)
        cnt:
          type: integer
          description: 후원 수량 (별풍선 개수 등)
        amount:
          type: integer
          description: 후원 KRW 가치 (별풍선 1개=100원, 치즈 1개=1원)
        extras:
          type: object
          description: 플랫폼별 원본 페이로드
        createdAt:
          type: string
          format: date-time
          description: 후원 발생 시각

    MissionSettleSummary:
      type: object
      description: |
        정산 시점에 같은 mission key 의 후원 내역을 집계한 결과.
        Socket `mission` 이벤트의 settle phase 페이로드와 동일 shape.
      properties:
        total_cnt:
          type: integer
          description: 후원 수량 합계
        total_amount:
          type: integer
          description: 후원 KRW 가치 합계
        donor_count:
          type: integer
          description: 정산에 포함된 후원 row 수 (= donors 배열 길이가 캡되지 않은 경우)
        streamers:
          type: array
          description: 미션에 연결된 스트리머 ID 목록 (대결미션이면 양쪽 모두 포함)
          items:
            type: string
        donors:
          type: array
          description: 후원자 명단 (시간순). MISSION_SETTLE_DONOR_CAP (기본 5000) 초과 시 잘립니다.
          items:
            $ref: '#/components/schemas/MissionDonor'
        donors_truncated:
          type: boolean
          description: donor_count 가 cap 을 초과해 donors 배열이 잘렸는지 여부

    Mission:
      type: object
      description: |
        미션 이벤트 한 건. SOOP 의 도전미션·대결미션과 치지직의 MISSION/MISSION_PARTICIPATION 후원이 통합 스키마로 들어옵니다.
        클라이언트는 platform 구분 없이 `mission_phase` (receive / settle / result) 만 보고 분기하면 됩니다.
      properties:
        id:
          type: string
          description: 데이터 ID (커서로 사용)
        type:
          type: string
          enum: [mission]
          description: mission 으로 고정
        platform:
          type: string
          enum: [soop, chzzk]
          description: 방송 플랫폼
        streamer_id:
          type: string
          description: 방송인 아이디
        user_id:
          type: string
          description: 후원자(또는 미션 생성자) 아이디. SETTLE/RESULT phase 에서는 비어있을 수 있음.
        nickname:
          type: string
          description: 후원자 닉네임
        mission_type:
          type: string
          description: |
            플랫폼 원본 mission_type.
            - SOOP: `CHALLENGE_GIFT`, `GIFT`, `CHALLENGE_SETTLE`, `SETTLE`, `CHALLENGE_NOTICE`, `NOTICE`
            - Chzzk: `PENDING` (MISSION 생성자), `APPROVED` (MISSION_PARTICIPATION 참가자)
            - 합성: `SETTLE`, `RESULT` (utility-chzzk-settle-synthesizer)
        mission_phase:
          type: string
          enum: [receive, settle, result]
          nullable: true
          description: |
            mission_type 으로부터 도출되는 통합 단계 라벨.
            - `receive`: 미션 후원 한 건이 들어옴
            - `settle`: 미션 정산 (후원자 명단·총합 동봉, settles 폴링에서 제공)
            - `result`: 미션 결과 메타 (성공/실패/무승부)
        key:
          type: string
          description: |
            mission_key. 같은 미션의 receive / settle / result 이벤트는 동일 key 를 공유합니다.
            Chzzk MISSION_PARTICIPATION 은 본 미션의 missionDonationId 로 묶입니다.
        title:
          type: string
          description: 미션 타이틀 (있는 경우)
        cnt:
          type: integer
          description: 후원 수량
        amount:
          type: integer
          description: 후원 KRW 가치
        extras:
          type: object
          description: 플랫폼별 원본 페이로드 (`extras.soop` 또는 `extras.chzzk`)
        createdAt:
          type: string
          format: date-time
          description: 데이터 생성일시
        ttl:
          type: string
          format: date-time
          description: 데이터 삭제예정일시
        settle:
          $ref: '#/components/schemas/MissionSettleSummary'
          description: settles 폴링 응답에서만 동봉. 일반 polling 에서는 없음.

    MissionSettings:
      type: object
      description: |
        소켓룸별 미션 이벤트 시점 설정 (v2.0+).
        대시보드 → 신청서 → **🎯 미션 설정** 에서 변경하며, MongoDB `socket-rooms` 컬렉션의 `mission` 서브도큐먼트로 영속화됩니다.
        서버는 이 값으로 Socket `mission` 이벤트의 phase 게이트를 수행하고, 같은 값을 emit 페이로드의 `mission_settings` 에 동봉해 클라이언트 이중 게이트를 가능하게 합니다.
        미션 자체는 항상 활성이며, 사용자는 받을 phase 만 선택합니다.
      properties:
        hook_timings:
          type: array
          description: 수신할 phase 배열. 기본 `["receive", "settle", "result"]` (전체). 최소 1개 필수.
          items:
            type: string
            enum: [receive, settle, result]
        updatedAt:
          type: string
          format: date-time
          description: 마지막 변경 시각

    Room:
      type: object
      properties:
        id:
          type: string
          description: 소켓소켓룸 식별을 위해 관리자가 부여한 아이디
        category:
          type: string
          description: 소켓소켓룸 카테고리
        users:
          type: array
          description: 소켓소켓룸에 가입 된 스트리머 목록
          items:
            $ref: '#/components/schemas/User'
        users_limit:
          type: integer
          description: 소켓소켓룸 가입 수 제한
        mission:
          $ref: '#/components/schemas/MissionSettings'
          description: 미션 게이트 설정 (v2.0+)
        createdAt:
          type: string
          format: date-time
          description: 소켓소켓룸 정보 생성일
        updatedAt:
          type: string
          format: date-time
          description: 소켓소켓룸 정보 업데이트
    Error:
      type: object
      description: |
        모든 에러 응답은 HTTP 200 으로 반환되며 body 의 `error` (숫자) 와 `error_code` (enum) 으로 구분.
        클라이언트는 사람이 읽는 `message` 가 아닌 `error_code` 로 분기하는 것을 권장합니다.
        전체 카탈로그는 [에러 코드 카탈로그](/docs/additional/error-codes) 참조.
      properties:
        error:
          type: integer
          description: 0 = 성공, 그 외 = 에러 (HTTP status 와 동일 의미)
          example: 400
        error_code:
          type: string
          description: 안정적 enum (v2.0+). 매핑 안 되는 코드를 받으면 message 를 fallback 으로 사용.
          example: STREAMER_LIMIT_EXCEEDED
          enum:
            - INVALID_INPUT
            - STREAMER_LIMIT_EXCEEDED
            - STREAMER_ALREADY_REGISTERED
            - STREAMER_UPPERCASE_FORBIDDEN
            - STREAMER_SPECIAL_CHARS
            - STREAMER_NOT_FOUND
            - STREAMER_NOT_REGISTERED
            - PLATFORM_INVALID
            - CURSOR_INVALID
            - DURATION_OUT_OF_RANGE
            - REFERENCE_TIME_INVALID
            - RANGE_EXCEEDS_LIMIT
            - UNAUTHORIZED
            - FORBIDDEN
            - NOT_FOUND
            - INTERNAL
            - DB_UNAVAILABLE
        message:
          type: string
          description: 사람이 읽을 수 있는 에러 메시지 (한국어). 문구는 변경될 수 있음.
        data:
          type: object

paths:
  /room:
    get:
      summary: 소켓룸 정보 조회
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Room'
        '400':
          description: 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
                
  /room/user:
    put:
      summary: 소켓룸에 스트리머 등록
      description: |
        소켓룸에 스트리머를 등록합니다.

        ## 등록 방법

        ### 1. 관리자 대시보드 (권장)
        [SSAPI 대시보드](http://dashboard.ssapi.kr/)에서 GUI 기반으로 간편하게 스트리머를 등록하고 관리할 수 있습니다.

        - 직관적인 인터페이스
        - 스트리머 목록 조회
        - 실시간 통계 확인

        ### 2. REST API
        프로그래밍 방식으로 자동화하거나 대량 등록이 필요한 경우 이 API를 사용하세요.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                platform:
                  type: string
                  enum: [soop, chzzk]
                  description: "방송 플랫폼: soop(숲/아프리카TV), chzzk(치지직)"
                user:
                  type: string
                  description: 스트리머 ID
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Room'
        '400':
          description: 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: 소켓룸에서 스트리머 삭제
      description: |
        소켓룸에서 스트리머를 삭제합니다.

        ## 삭제 방법

        ### 1. 관리자 대시보드 (권장)
        [SSAPI 대시보드](http://dashboard.ssapi.kr/)에서 GUI 기반으로 간편하게 스트리머를 삭제할 수 있습니다.

        ### 2. REST API
        프로그래밍 방식으로 자동화가 필요한 경우 이 API를 사용하세요.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                platform:
                  type: string
                  enum: [soop, chzzk]
                  description: "방송 플랫폼: soop(숲/아프리카TV), chzzk(치지직)"
                user:
                  type: string
                  description: 스트리머 ID
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Room'
        '400':
          description: 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /chats/polling:
    get:
      summary: 채팅 내역 파싱
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: cursor
          schema:
            type: string
          description: 마지막 데이터의 커서 (미입력 시 최근 데이터 반환)
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            maximum: 100
          description: 한번에 가져올 값
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: integer
                    example: 0
                  currentCursor:
                    type: string
                  nextCursor:
                    type: string
                    nullable: true
                  result:
                    type: array
                    items:
                      $ref: '#/components/schemas/Chat'
                  length:
                    type: integer
        '400':
          $ref: '#/components/responses/ClientError'

  /donations/polling:
    get:
      summary: 후원 내역 파싱
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: cursor
          schema:
            type: string
          description: 마지막 데이터의 커서 (미입력 시 최근 데이터 반환)
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            maximum: 100
          description: 한번에 가져올 값
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: integer
                    example: 0
                  currentCursor:
                    type: string
                  nextCursor:
                    type: string
                    nullable: true
                  result:
                    type: array
                    items:
                      $ref: '#/components/schemas/Donation'
                  length:
                    type: integer
        '400':
          $ref: '#/components/responses/ClientError'

  /chats/summaries/streamers:
    get:
      tags:
        - Alliance API
      summary: 채팅 통계 데이터 (제휴)
      description: |
        ⚠️ 제휴 전용 API
        이 API는 별도 제휴를 통해서만 제공되는 제휴 전용 API입니다.
        일반 API에 비해 심사 요건이 매우 까다롭습니다.
        제휴를 하지 않은 경우 API 키가 있더라도 사용할 수 없습니다.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: reference_time
          required: true
          schema:
            type: string
            format: date-time
            description: ISO 8601 형식의 기준 시간
        - in: query
          name: duration
          required: true
          schema:
            type: integer
            minimum: 30
            maximum: 3600
          description: 조회 기간(초), 30초에서 3600초 사이
        - in: query
          name: platform
          schema:
            type: string
            enum: [soop, chzzk]
          description: 플랫폼 필터
        - in: query
          name: streamer_id
          schema:
            type: string
          description: 특정 스트리머 ID 필터
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: integer
                    example: 0
                  summaries:
                    type: object
                    properties:
                      soop:
                        type: object
                        additionalProperties:
                          type: integer
                      chzzk:
                        type: object
                        additionalProperties:
                          type: integer
                  reference:
                    type: object
                    properties:
                      IOS8601:
                        type: object
                        properties:
                          start:
                            type: string
                            format: date-time
                          end:
                            type: string
                            format: date-time
                      KST:
                        type: object
                        properties:
                          start:
                            type: string
                          end:
                            type: string
                      match_condition:
                        type: object
                      applied_filters:
                        type: object
                  duration:
                    type: integer
                  total:
                    type: object
                    properties:
                      streamer:
                        type: integer
                      chat:
                        type: integer
        '400':
