  /missions/polling:
    get:
      summary: 미션 내역 파싱
      description: |
        미션 이벤트의 **개별 RAW row** 를 커서 기반으로 페이지네이션해 반환합니다.
        SOOP 의 도전미션·대결미션과 치지직의 MISSION/MISSION_PARTICIPATION 후원이 동일 스키마로 들어옵니다.

        ## phase / mission_type 필터

        받고 싶은 시점만 필터하려면 `phase` 쿼리를 사용하세요:
        - `receive` — 미션 후원 한 건 (`CHALLENGE_GIFT`, `GIFT`, `PENDING`, `APPROVED`)
        - `settle` — 정산 메타 (`CHALLENGE_SETTLE`, `SETTLE`)
        - `result` — 결과 메타 (`CHALLENGE_NOTICE`, `NOTICE`, `RESULT`)

        보다 세밀한 분기는 `mission_type` 으로 원본 값을 직접 지정합니다 (`phase` 보다 우선 적용).

        ## settle 페이로드는 어디에?

        이 엔드포인트는 정산 row 도 RAW 한 건씩 반환합니다 (donors 명단 미포함).
        후원자 명단·총합 집계가 필요하면 `/missions/settles/polling` 을 사용하세요.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: cursor
          schema:
            type: string
          description: 마지막 데이터의 커서 (미입력 시 최근 데이터 반환)
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            maximum: 100
          description: 한번에 가져올 값
        - in: query
          name: phase
          schema:
            type: string
            enum: [receive, settle, result]
          description: 미션 단계 필터. mission_type 후보를 자동으로 매핑합니다.
        - in: query
          name: mission_type
          schema:
            type: string
          description: 원본 mission_type 직접 필터 (phase 보다 우선)
        - in: query
          name: platform
          schema:
            type: string
            enum: [soop, chzzk]
          description: 플랫폼 필터
        - in: query
          name: streamer_id
          schema:
            type: string
          description: 특정 스트리머 ID 필터
        - in: query
          name: key
          schema:
            type: string
          description: 특정 미션 key (mission_key) 필터 — 한 미션의 receive/settle/result 만 모아보고 싶을 때 유용
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: integer
                    example: 0
                  currentCursor:
                    type: string
                  nextCursor:
                    type: string
                    nullable: true
                  result:
                    type: array
                    items:
                      $ref: '#/components/schemas/Mission'
                  length:
                    type: integer
                  applied_filters:
                    type: object
        '400':
          $ref: '#/components/responses/ClientError'
        '401':
          $ref: '#/components/responses/ClientError'

  /missions/settles/polling:
    get:
      summary: 미션 정산 내역 파싱
      description: |
        미션 정산(settle) 이벤트만 커서 기반으로 페이지네이션하면서, 각 정산 row 마다 같은 `mission key`
        의 후원 내역을 집계해 `settle.{total_cnt, total_amount, donor_count, streamers, donors[], donors_truncated}` 형태로
        동봉합니다. **Socket `mission` 이벤트의 settle phase 페이로드와 동일 shape** 이므로 실시간/오프라인 양쪽에서 같은 코드로 처리할 수 있습니다.

        ## donor 캡

        후원자 수가 매우 많은 미션은 `donors` 배열이 잘릴 수 있습니다 (서버 환경변수
        `MISSION_SETTLE_DONOR_CAP` — 기본 5000). 잘린 경우 `settle.donors_truncated: true` 로 표시되며,
        `total_cnt` / `total_amount` / `donor_count` 는 잘리기 **전** 의 합계가 아니라 응답에 담긴
        donors 합계입니다.

        ## 대결미션

        양 스트리머가 동일 key 로 정산되므로 `settle.streamers` 에 두 ID 가 모두 포함됩니다.
        후원자 row 의 `streamer_id` 로 어느 쪽으로 들어갔는지 확인할 수 있습니다.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: cursor
          schema:
            type: string
          description: 마지막 데이터의 커서 (미입력 시 최근 데이터 반환)
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
            maximum: 50
          description: 한번에 가져올 정산 건수 (donors 배열을 동반하므로 보수적으로 설정)
        - in: query
          name: platform
          schema:
            type: string
            enum: [soop, chzzk]
          description: 플랫폼 필터
        - in: query
          name: streamer_id
          schema:
            type: string
          description: 특정 스트리머 ID 필터
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: integer
                    example: 0
                  currentCursor:
                    type: string
                  nextCursor:
                    type: string
                    nullable: true
                  result:
                    type: array
                    items:
                      $ref: '#/components/schemas/Mission'
                  length:
                    type: integer
                  applied_filters:
                    type: object
        '400':
          $ref: '#/components/responses/ClientError'
        '401':
          $ref: '#/components/responses/ClientError'

